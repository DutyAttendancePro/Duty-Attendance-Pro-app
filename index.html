<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Duty Attendance Pro</title>
<meta name="description" content="Offline-first duty attendance, shift, salary, leave, and reports tracker. Install on any device." />
<meta name="theme-color" content="#0F1721" />
<meta name="color-scheme" content="dark light" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="DutyPro" />
<meta name="mobile-web-app-capable" content="yes" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' 'unsafe-inline'; connect-src 'self'; base-uri 'self'; form-action 'self';" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --ink:#0F1721;        --ink-2:#16212E;       --ink-3:#1E2C3B;
  --brass:#C9A24B;       --brass-light:#E0BF7A; --brass-dim:#8A723A;
  --paper:#F3EFE6;       --paper-dim:#E7E2D5;
  --green:#3C7A5C;       --green-soft:#2A5641;
  --rust:#B5482D;        --rust-soft:#7A3322;
  --blue:#3D6B96;
  --text-hi:#F3EFE6;     --text-lo:#9FAAB6;
  --border:rgba(243,239,230,0.10);
  --shadow: 0 12px 32px rgba(0,0,0,0.35);
  --radius-lg:24px; --radius-md:16px; --radius-sm:10px;
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --bg:var(--ink); --surface:var(--ink-2); --surface-2:var(--ink-3);
  --fg:var(--text-hi); --fg-dim:var(--text-lo); --accent:var(--brass);
  color-scheme: dark;
}
[data-theme="light"]{
  --bg:var(--paper); --surface:#FFFFFF; --surface-2:var(--paper-dim);
  --fg:#1B2430; --fg-dim:#5C6470; --accent:var(--brass-dim);
  --border:rgba(20,25,35,0.10);
  --shadow: 0 12px 28px rgba(20,25,35,0.10);
  color-scheme: light;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--fg); font-family:var(--font-body);
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
  padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
}
@media (prefers-reduced-motion: reduce){ *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;} }
h1,h2,h3,.display{font-family:var(--font-display); letter-spacing:-0.01em;}
.mono{font-family:var(--font-mono);}
a{color:inherit;}
button{font-family:inherit;}
::selection{ background:var(--accent); color:var(--ink);}
:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:4px;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}

/* ============ APP SHELL ============ */
#app{ display:block; min-height:100vh; visibility:hidden; }
#app.ready{ visibility:visible; }

/* Splash */
#splash{
  position:fixed; inset:0; background:#0F1721; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
  opacity:1; transition:opacity 0.6s ease;
}
#splash.hide{ opacity:0; }
#splash.gone{ display:none; }
.splash-dial{
  width:88px; height:88px; border-radius:50%; border:5px solid #C9A24B;
  position:relative; animation:dial-pulse 1.8s ease-in-out infinite;
}
.splash-dial::before{
  content:''; position:absolute; top:50%; left:50%; width:2px; height:30px; background:#C9A24B;
  transform-origin:bottom center; transform:translate(-50%,-100%) rotate(45deg); border-radius:2px;
  animation:hand-spin 2.4s linear infinite;
}
.splash-dial::after{
  content:''; position:absolute; top:50%; left:50%; width:5px; height:5px; background:#C9A24B;
  transform:translate(-50%,-50%); border-radius:50%;
}
@keyframes hand-spin{ from{ transform:translate(-50%,-100%) rotate(0deg);} to{ transform:translate(-50%,-100%) rotate(360deg);} }
@keyframes dial-pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(201,162,75,0.3);} 50%{ box-shadow:0 0 0 16px rgba(201,162,75,0);} }
.splash-title{ font-family:var(--font-display); font-size:1.6rem; color:#F3EFE6; font-weight:700; letter-spacing:-0.01em; }
.splash-sub{ color:#9FAAB6; font-size:0.82rem; text-align:center; }
.splash-progress{ width:200px; height:3px; background:rgba(201,162,75,0.18); border-radius:999px; overflow:hidden; }
.splash-bar{ height:100%; width:0%; background:#C9A24B; border-radius:999px; animation:bar-fill 2.2s ease forwards; }
@keyframes bar-fill{ 0%{width:0%} 40%{width:55%} 80%{width:88%} 100%{width:100%} }
.splash-ver{ position:absolute; bottom:32px; color:#6B7785; font-size:0.74rem; font-family:var(--font-body); text-align:center; line-height:1.5; }

/* Lock screen */
#lock{
  position:fixed; inset:0; background:var(--ink); z-index:9000; display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:22px; padding:24px;
}
#lock.show{ display:flex; }
.lock-dial{ width:64px; height:64px; border-radius:50%; background:var(--brass); display:flex; align-items:center; justify-content:center; font-size:26px; color:var(--ink); box-shadow:var(--shadow);}
.lock-title{ font-family:var(--font-display); color:var(--paper); font-size:1.15rem; font-weight:600;}
.lock-sub{ color:var(--text-lo); font-size:0.82rem;}
.pin-dots{ display:flex; gap:14px; margin:6px 0;}
.pin-dot{ width:14px; height:14px; border-radius:50%; border:2px solid var(--brass-dim); transition:background .15s, transform .15s;}
.pin-dot.filled{ background:var(--brass); transform:scale(1.1); border-color:var(--brass);}
.pin-pad{ display:grid; grid-template-columns:repeat(3,68px); gap:14px;}
.pin-key{
  width:68px; height:68px; border-radius:50%; border:1px solid var(--border); background:var(--ink-2);
  color:var(--paper); font-size:1.3rem; font-family:var(--font-display); cursor:pointer; transition:transform .1s, background .15s;
}
.pin-key:active{ transform:scale(0.92); background:var(--ink-3);}
.pin-key.ghost{ background:transparent; border:none; color:var(--text-lo); font-size:0.85rem;}
.lock-error{ color:var(--rust); font-size:0.78rem; height:16px;}
.lock-bio{ margin-top:4px; background:none; border:1px solid var(--border); color:var(--brass-light); padding:10px 18px; border-radius:999px; font-size:0.82rem; cursor:pointer;}

/* Layout */
.shell{ display:flex; min-height:100vh; }
.sidebar{
  display:none; width:248px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border);
  padding:20px 14px; flex-direction:column; gap:4px; position:sticky; top:0; height:100vh; overflow-y:auto;
}
.side-brand{ display:flex; align-items:center; gap:10px; padding:8px 10px 22px; }
.side-brand .mark{ width:34px; height:34px; border-radius:50%; border:3px solid var(--brass); flex-shrink:0; position:relative;}
.side-brand .mark::after{content:'';position:absolute;top:50%;left:50%;width:1.5px;height:10px;background:var(--brass);transform:translate(-50%,-100%) rotate(35deg);transform-origin:bottom;}
.side-brand b{ font-family:var(--font-display); font-size:0.95rem; }
.main{ flex:1; min-width:0; padding-bottom:90px; }
.topbar{
  position:sticky; top:0; z-index:50; background:color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.topbar h1{ font-size:1.05rem; margin:0; }
.topbar .right{ display:flex; gap:8px; align-items:center;}
.icon-btn{
  width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--surface);
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--fg); font-size:1rem; transition:background .15s, transform .1s;
}
.icon-btn:active{ transform:scale(0.92); }
.view{ padding:16px 16px 6px; max-width:1080px; margin:0 auto; }
.view-title{ font-size:1.4rem; margin:6px 0 16px; }

/* Bottom nav (mobile) */
.bottom-nav{
  position:fixed; left:0; right:0; bottom:0; z-index:80; background:color-mix(in srgb, var(--surface) 92%, transparent);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-top:1px solid var(--border);
  display:flex; padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
.nav-item{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; border-radius:14px;
  background:none; border:none; color:var(--fg-dim); font-size:0.62rem; cursor:pointer; transition:color .15s, background .15s;
}
.nav-item .ic{ font-size:1.15rem; }
.nav-item.active{ color:var(--accent); background:color-mix(in srgb, var(--accent) 12%, transparent); }

/* Desktop nav inside sidebar */
.side-link{
  display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:12px; color:var(--fg-dim);
  font-size:0.86rem; cursor:pointer; border:none; background:none; text-align:left; width:100%; transition:background .15s,color .15s;
}
.side-link .ic{ width:20px; text-align:center; font-size:1rem;}
.side-link.active{ background:color-mix(in srgb, var(--accent) 14%, transparent); color:var(--accent); font-weight:600;}
.side-link:hover{ background:var(--surface-2); }
.side-foot{ margin-top:auto; padding:10px; font-size:0.7rem; color:var(--fg-dim); border-top:1px solid var(--border); padding-top:14px;}

@media (min-width:900px){
  .sidebar{ display:flex; }
  .bottom-nav{ display:none; }
  .main{ padding-bottom:24px; }
  .view{ padding:24px 32px; }
}

/* ============ CARDS / COMPONENTS ============ */
.card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:18px; box-shadow:var(--shadow);
}
.card + .card{ margin-top:14px; }
.grid{ display:grid; gap:14px; }
.grid-2{ grid-template-columns:repeat(2,1fr); }
.grid-3{ grid-template-columns:repeat(3,1fr); }
@media (max-width:520px){ .grid-3{ grid-template-columns:repeat(2,1fr);} }
@media (min-width:700px){ .grid-2{ grid-template-columns:repeat(2,1fr);} }

.stat{ display:flex; flex-direction:column; gap:4px; }
.stat .label{ font-size:0.7rem; color:var(--fg-dim); text-transform:uppercase; letter-spacing:0.05em; }
.stat .value{ font-family:var(--font-display); font-size:1.35rem; font-weight:700; }
.stat .value.mono{ font-family:var(--font-mono); }

.pill{ display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:999px; font-size:0.7rem; font-weight:600; }
.pill.green{ background:color-mix(in srgb, var(--green) 28%, transparent); color:#7CCBA2; }
.pill.rust{ background:color-mix(in srgb, var(--rust) 25%, transparent); color:#F0917B; }
.pill.brass{ background:color-mix(in srgb, var(--brass) 22%, transparent); color:var(--brass-light); }
.pill.blue{ background:color-mix(in srgb, var(--blue) 25%, transparent); color:#8FC1EE; }
.pill.gray{ background:var(--surface-2); color:var(--fg-dim); }

.btn{
  border:none; border-radius:999px; padding:12px 20px; font-size:0.88rem; font-weight:600; cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center; gap:8px; transition:transform .1s, filter .15s, background .15s;
}
.btn:active{ transform:scale(0.97); }
.btn-primary{ background:var(--accent); color:var(--ink); }
.btn-primary:hover{ filter:brightness(1.08); }
.btn-outline{ background:transparent; border:1px solid var(--border); color:var(--fg); }
.btn-outline:hover{ background:var(--surface-2); }
.btn-ghost{ background:var(--surface-2); color:var(--fg); }
.btn-danger{ background:color-mix(in srgb, var(--rust) 85%, black); color:#FBD9D0; }
.btn-block{ width:100%; }
.btn-lg{ padding:16px 22px; font-size:0.98rem; }
.btn:disabled{ opacity:0.45; cursor:not-allowed; }

.field{ display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
.field label{ font-size:0.74rem; color:var(--fg-dim); font-weight:600; text-transform:uppercase; letter-spacing:0.04em; }
.field input, .field select, .field textarea{
  background:var(--surface-2); border:1px solid var(--border); color:var(--fg); border-radius:var(--radius-sm);
  padding:11px 13px; font-size:0.92rem; font-family:inherit; width:100%;
}
.field textarea{ resize:vertical; min-height:64px; }
.field input:focus, .field select:focus, .field textarea:focus{ outline:2px solid var(--accent); outline-offset:1px; }
.field-row{ display:flex; gap:10px; }
.field-row .field{ flex:1; }
.switch-row{ display:flex; align-items:center; justify-content:space-between; padding:10px 2px; border-bottom:1px solid var(--border); }
.switch-row:last-child{ border-bottom:none; }
.switch-row .lbl{ font-size:0.88rem; }
.switch-row .sub{ font-size:0.72rem; color:var(--fg-dim); }
.switch{ position:relative; width:46px; height:26px; flex-shrink:0; }
.switch input{ opacity:0; width:0; height:0; }
.switch .track{ position:absolute; inset:0; background:var(--surface-2); border:1px solid var(--border); border-radius:999px; cursor:pointer; transition:background .15s; }
.switch .thumb{ position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:var(--fg-dim); transition:transform .18s, background .18s; }
.switch input:checked + .track{ background:color-mix(in srgb, var(--accent) 35%, transparent); border-color:var(--accent); }
.switch input:checked + .track .thumb{ transform:translateX(20px); background:var(--accent); }

.empty{ text-align:center; padding:36px 16px; color:var(--fg-dim); }
.empty .ic{ font-size:2rem; margin-bottom:10px; }
.empty .t{ font-size:0.92rem; color:var(--fg); font-weight:600; margin-bottom:4px;}
.empty .s{ font-size:0.8rem; }

.toast-wrap{ position:fixed; top:calc(14px + env(safe-area-inset-top)); left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:8px; z-index:9500; pointer-events:none; }
.toast{
  background:var(--ink-2); color:var(--paper); border:1px solid var(--border); padding:11px 18px; border-radius:999px;
  font-size:0.84rem; box-shadow:var(--shadow); animation:toast-in .25s ease; display:flex; align-items:center; gap:8px;
}
@keyframes toast-in{ from{ opacity:0; transform:translateY(-10px);} to{ opacity:1; transform:translateY(0);} }

.modal-bg{ position:fixed; inset:0; background:rgba(8,12,18,0.62); backdrop-filter:blur(3px); z-index:1000; display:none; align-items:flex-end; justify-content:center; }
.modal-bg.show{ display:flex; }
@media (min-width:640px){ .modal-bg{ align-items:center; } }
.modal{
  background:var(--surface); border:1px solid var(--border); border-radius:22px 22px 0 0; width:100%; max-width:480px;
  max-height:88vh; overflow-y:auto; padding:20px; animation:modal-up .22s ease;
}
@media (min-width:640px){ .modal{ border-radius:22px; } }
@keyframes modal-up{ from{ transform:translateY(24px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
.modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.modal-head h3{ margin:0; font-size:1.05rem; }

/* Punch dial - signature element */
.punch-wrap{ display:flex; flex-direction:column; align-items:center; gap:14px; padding:10px 0 4px; }
.punch{
  position:relative; width:172px; height:172px; border-radius:50%;
  background: conic-gradient(var(--accent) calc(var(--pct,0)*1%), var(--surface-2) 0);
  display:flex; align-items:center; justify-content:center; transition:background 1s ease;
}
.punch::before{ content:''; position:absolute; inset:10px; border-radius:50%; background:var(--surface); border:1px solid var(--border); }
.punch-inner{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:2px; }
.punch-inner .t{ font-family:var(--font-mono); font-size:1.5rem; font-weight:700; }
.punch-inner .l{ font-size:0.66rem; color:var(--fg-dim); text-transform:uppercase; letter-spacing:0.06em; }
.punch-actions{ display:flex; gap:10px; width:100%; }

/* Calendar */
.cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.cal-dow{ text-align:center; font-size:0.65rem; color:var(--fg-dim); font-weight:600; padding-bottom:4px;}
.cal-cell{
  aspect-ratio:1; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--surface-2); cursor:pointer; position:relative; font-size:0.8rem; border:1px solid transparent; transition:transform .1s;
}
.cal-cell:active{ transform:scale(0.93); }
.cal-cell.empty{ background:transparent; cursor:default; }
.cal-cell .dot{ width:5px; height:5px; border-radius:50%; margin-top:3px; }
.cal-cell.today{ border-color:var(--accent); }
.cal-cell.present{ background:color-mix(in srgb, var(--green) 26%, var(--surface-2)); }
.cal-cell.absent{ background:color-mix(in srgb, var(--rust) 22%, var(--surface-2)); }
.cal-cell.leave{ background:color-mix(in srgb, var(--blue) 22%, var(--surface-2)); }
.cal-cell.holiday{ background:color-mix(in srgb, var(--brass) 20%, var(--surface-2)); }
.cal-legend{ display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; font-size:0.72rem; color:var(--fg-dim); }
.cal-legend span{ display:inline-flex; align-items:center; gap:5px; }
.cal-legend i{ width:9px; height:9px; border-radius:50%; display:inline-block; }

.seg{ display:flex; background:var(--surface-2); border-radius:999px; padding:3px; gap:2px; }
.seg button{ flex:1; border:none; background:none; padding:8px 10px; border-radius:999px; font-size:0.78rem; color:var(--fg-dim); cursor:pointer; font-weight:600; }
.seg button.active{ background:var(--accent); color:var(--ink); }

.list-row{ display:flex; align-items:center; gap:12px; padding:12px 4px; border-bottom:1px solid var(--border); }
.list-row:last-child{ border-bottom:none; }
.list-row .ic-box{ width:38px; height:38px; border-radius:12px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:1rem; }
.list-row .body{ flex:1; min-width:0; }
.list-row .ttl{ font-size:0.88rem; font-weight:600; }
.list-row .sub{ font-size:0.74rem; color:var(--fg-dim); margin-top:2px; }
.list-row .meta{ text-align:right; font-size:0.78rem; flex-shrink:0; }

.search-box{ position:relative; margin-bottom:14px; }
.search-box input{ width:100%; padding:12px 14px 12px 40px; border-radius:999px; border:1px solid var(--border); background:var(--surface); color:var(--fg); font-size:0.88rem; }
.search-box .ic{ position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--fg-dim); }

table.report-table{ width:100%; border-collapse:collapse; font-size:0.82rem; }
table.report-table th, table.report-table td{ padding:9px 8px; border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; }
table.report-table th{ color:var(--fg-dim); font-weight:600; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.03em; }
.table-scroll{ overflow-x:auto; }

canvas.chart{ width:100%; height:180px; display:block; }

.fab{
  position:fixed; right:18px; bottom:84px; z-index:60; width:58px; height:58px; border-radius:50%;
  background:var(--accent); color:var(--ink); border:none; font-size:1.5rem; box-shadow:var(--shadow); cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:transform .15s;
}
.fab:active{ transform:scale(0.9) rotate(8deg); }
@media (min-width:900px){ .fab{ bottom:24px; } }

.skeleton{ background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface) 37%,var(--surface-2) 63%); background-size:400% 100%; animation:sk 1.4s ease infinite; border-radius:10px; }
@keyframes sk{ 0%{background-position:100% 0;} 100%{background-position:0 0;} }

.hidden{ display:none !important; }
.muted{ color:var(--fg-dim); }
.center{ text-align:center; }
.mt-4{ margin-top:4px;} .mt-8{ margin-top:8px;} .mt-14{ margin-top:14px;} .mt-20{ margin-top:20px;}
.flex{ display:flex; } .between{ justify-content:space-between; } .items-center{ align-items:center; } .gap-8{ gap:8px;} .gap-10{gap:10px;} .wrap{flex-wrap:wrap;}
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="splash-dial"></div>
  <div class="splash-title">Duty Attendance Pro</div>
  <div class="splash-sub">Your offline-first attendance tracker</div>
  <div class="splash-progress"><div class="splash-bar" id="splashBar"></div></div>
  <div class="splash-ver">Developed by <strong style="color:#E0BF7A">Samsad Ansari</strong><br>v1.0.0</div>
</div>

<!-- PIN Lock -->
<div id="lock">
  <div class="lock-dial">🔒</div>
  <div class="lock-title" id="lockTitle">Enter PIN</div>
  <div class="lock-sub" id="lockSub">Your data stays on this device</div>
