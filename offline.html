<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline – Duty Attendance Pro</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0F1721;color:#F3EFE6;font-family:Inter,system-ui,sans-serif;text-align:center;padding:24px}
  .card{max-width:360px}
  .dial{width:96px;height:96px;border-radius:50%;border:6px solid #C9A24B;margin:0 auto 24px;
    display:flex;align-items:center;justify-content:center;font-size:36px}
  h1{font-size:1.25rem;margin:0 0 8px}
  p{color:#B9C0C9;font-size:0.95rem;line-height:1.5}
  button{margin-top:20px;background:#C9A24B;color:#0F1721;border:none;padding:12px 24px;
    border-radius:999px;font-weight:600;font-size:0.95rem;cursor:pointer}
</style>
</head>
<body>
  <div class="card">
    <div class="dial">🕐</div>
    <h1>You're offline</h1>
    <p>Duty Attendance Pro works offline for everything you've already opened. Check-ins, the calendar, and your salary data are all saved on this device. Reconnect to sync push reminders.</p>
    <button onclick="location.href='/index.html'">Back to the app</button>
  </div>
</body>
</html>
